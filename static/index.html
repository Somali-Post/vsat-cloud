<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VSAT Decision Support</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #111111;
      --line: #2f2f2f;
      --text: #ffffff;
      --muted: #bdbdbd;
      --accent: #ffffff;
      --active: #15c76f;
      --danger: #ff4d4d;
      --console: #070707;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .camera {
      position: relative;
      height: 50dvh;
      min-height: 280px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      background: #050505;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000000;
      transform-origin: center center;
      transition: transform 120ms ease;
    }

    #targetingBox {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 84%;
      aspect-ratio: 16 / 9;
      border: 2px solid #00e5ff;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      z-index: 3;
    }

    #targetingBox .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #00e5ff;
      border-style: solid;
      border-width: 0;
    }

    #targetingBox .corner.tl {
      top: -2px;
      left: -2px;
      border-top-width: 4px;
      border-left-width: 4px;
    }

    #targetingBox .corner.tr {
      top: -2px;
      right: -2px;
      border-top-width: 4px;
      border-right-width: 4px;
    }

    #targetingBox .corner.bl {
      bottom: -2px;
      left: -2px;
      border-bottom-width: 4px;
      border-left-width: 4px;
    }

    #targetingBox .corner.br {
      bottom: -2px;
      right: -2px;
      border-bottom-width: 4px;
      border-right-width: 4px;
    }

    .camera-status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #3b3b3b;
      background: rgba(0, 0, 0, 0.7);
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .controls {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      gap: 12px;
    }

    .toggle-wrap {
      display: grid;
      gap: 8px;
    }

    .toggle-label {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.13em;
      font-weight: 700;
    }

    .toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-option span {
      display: grid;
      place-items: center;
      min-height: 64px;
      border-radius: 14px;
      border: 1px solid #4a4a4a;
      background: #161616;
      color: #e6e6e6;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      user-select: none;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .toggle-option input:checked + span {
      background: var(--accent);
      border-color: var(--accent);
      color: #000000;
    }

    .zoom-wrap {
      display: grid;
      gap: 8px;
      padding: 10px 10px 12px;
      border-radius: 12px;
      border: 1px solid #3b3b3b;
      background: #141414;
    }

    .zoom-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-weight: 700;
      text-transform: uppercase;
    }

    #zoomSlider {
      width: 100%;
      accent-color: #00e5ff;
    }

    #analyzeBtn {
      width: 100%;
      min-height: 112px;
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: #000000;
      font-size: clamp(1.8rem, 8.5vw, 3.3rem);
      font-weight: 900;
      letter-spacing: 0.09em;
      touch-action: manipulation;
      cursor: pointer;
      transition: transform 90ms ease, opacity 120ms ease;
    }

    #analyzeBtn:active {
      transform: scale(0.99);
    }

    #analyzeBtn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #downloadBtn {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid #4d4d4d;
      background: #1a1a1a;
      color: #e9e9e9;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      touch-action: manipulation;
      cursor: pointer;
    }

    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .results {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .hud {
      display: grid;
      gap: 18px;
      padding: 18px 12px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .hud-block {
      display: grid;
      gap: 6px;
    }

    .hud-label {
      font-size: clamp(0.88rem, 3.5vw, 1.1rem);
      letter-spacing: 0.13em;
      font-weight: 700;
      color: var(--muted);
    }

    .hud-value {
      font-size: clamp(2.1rem, 11.5vw, 5.4rem);
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--text);
      word-break: break-word;
    }

    .vision-panel {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      background: #0a0a0a;
    }

    .vision-title {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
    }

    #visionConsole {
      margin: 0;
      min-height: 150px;
      max-height: 34dvh;
      overflow: auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #333333;
      background: var(--console);
      color: #eaf8ee;
      font-size: 0.78rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
    }

    .ok {
      color: var(--active);
    }

    .error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="camera">
      <video id="video" autoplay playsinline muted></video>
      <div id="targetingBox" aria-hidden="true">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
      </div>
      <div id="cameraStatus" class="camera-status">REQUESTING CAMERA...</div>
    </section>

    <section class="controls">
      <div class="zoom-wrap">
        <label for="zoomSlider" class="zoom-label">
          <span>Targeting Zoom</span>
          <span id="zoomValue">1.0x</span>
        </label>
        <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">
      </div>
      <div class="toggle-wrap">
        <div class="toggle-label">GAME TYPE</div>
        <div class="toggle-group" role="radiogroup" aria-label="Game Type">
          <label class="toggle-option">
            <input type="radio" name="gameType" value="CASH" checked>
            <span>CASH</span>
          </label>
          <label class="toggle-option">
            <input type="radio" name="gameType" value="TOURNAMENT">
            <span>TOURNAMENT</span>
          </label>
        </div>
      </div>
      <button id="analyzeBtn" type="button" disabled>ANALYZE</button>
      <button id="downloadBtn" type="button" disabled>DOWNLOAD SNAPSHOT</button>
    </section>

    <section class="results">
      <section class="hud" aria-live="polite">
        <div class="hud-block">
          <div class="hud-label">ACTION</div>
          <div id="action" class="hud-value">WAITING...</div>
        </div>
        <div class="hud-block">
          <div class="hud-label">SIZE</div>
          <div id="size" class="hud-value">WAITING...</div>
        </div>
      </section>

      <section class="vision-panel">
        <div class="vision-title">VISION CONSOLE</div>
        <pre id="visionConsole">WAITING FOR ANALYSIS OUTPUT...</pre>
      </section>
    </section>

    <canvas id="captureCanvas" hidden></canvas>
  </main>

  <script>
    const MAX_WIDTH = 1280;
    const JPEG_QUALITY = 0.7;

    const video = document.getElementById("video");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const actionEl = document.getElementById("action");
    const sizeEl = document.getElementById("size");
    const cameraStatusEl = document.getElementById("cameraStatus");
    const captureCanvas = document.getElementById("captureCanvas");
    const visionConsole = document.getElementById("visionConsole");
    const targetingBox = document.getElementById("targetingBox");
    const zoomSlider = document.getElementById("zoomSlider");
    const zoomValueEl = document.getElementById("zoomValue");
    const downloadBtn = document.getElementById("downloadBtn");

    let stream = null;
    let videoTrack = null;
    let supportsNativeZoom = false;
    let cssZoomFactor = 1;

    function setHud(actionText, sizeText) {
      actionEl.textContent = actionText;
      sizeEl.textContent = sizeText;
    }

    function setButtonState(text) {
      analyzeBtn.textContent = text;
    }

    function setVisionConsole(value, isError = false) {
      visionConsole.textContent = value;
      visionConsole.classList.toggle("error", isError);
      visionConsole.classList.toggle("ok", !isError);
    }

    function updateTargetingBoxSize() {
      const camera = targetingBox.parentElement;
      if (!camera) {
        return;
      }

      const margin = 24;
      const maxWidth = Math.max(120, camera.clientWidth - margin);
      const maxHeight = Math.max(70, camera.clientHeight - margin);
      let width = Math.min(maxWidth, maxHeight * (16 / 9));
      let height = width * (9 / 16);

      if (height > maxHeight) {
        height = maxHeight;
        width = height * (16 / 9);
      }

      targetingBox.style.width = `${Math.round(width)}px`;
      targetingBox.style.height = `${Math.round(height)}px`;
    }

    function getRenderedVideoRect() {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      const videoRect = video.getBoundingClientRect();
      if (!sourceWidth || !sourceHeight || !videoRect.width || !videoRect.height) {
        return null;
      }

      const sourceAspect = sourceWidth / sourceHeight;
      const elementAspect = videoRect.width / videoRect.height;
      let drawWidth;
      let drawHeight;
      let offsetX;
      let offsetY;

      if (elementAspect > sourceAspect) {
        drawHeight = videoRect.height;
        drawWidth = drawHeight * sourceAspect;
        offsetX = (videoRect.width - drawWidth) / 2;
        offsetY = 0;
      } else {
        drawWidth = videoRect.width;
        drawHeight = drawWidth / sourceAspect;
        offsetX = 0;
        offsetY = (videoRect.height - drawHeight) / 2;
      }

      const scale = cssZoomFactor > 1 ? cssZoomFactor : 1;
      const centerX = offsetX + (drawWidth / 2);
      const centerY = offsetY + (drawHeight / 2);
      const scaledWidth = drawWidth * scale;
      const scaledHeight = drawHeight * scale;

      return {
        left: videoRect.left + centerX - (scaledWidth / 2),
        top: videoRect.top + centerY - (scaledHeight / 2),
        width: scaledWidth,
        height: scaledHeight,
        sourceWidth,
        sourceHeight
      };
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getSmartCropRectFromTargetingBox() {
      const rendered = getRenderedVideoRect();
      if (!rendered) {
        return null;
      }

      const box = targetingBox.getBoundingClientRect();
      const cropLeft = Math.max(box.left, rendered.left);
      const cropTop = Math.max(box.top, rendered.top);
      const cropRight = Math.min(box.right, rendered.left + rendered.width);
      const cropBottom = Math.min(box.bottom, rendered.top + rendered.height);

      const cropWidthPx = cropRight - cropLeft;
      const cropHeightPx = cropBottom - cropTop;

      if (cropWidthPx <= 1 || cropHeightPx <= 1) {
        return null;
      }

      const normX = (cropLeft - rendered.left) / rendered.width;
      const normY = (cropTop - rendered.top) / rendered.height;
      const normW = cropWidthPx / rendered.width;
      const normH = cropHeightPx / rendered.height;

      const sx = clamp(Math.round(normX * rendered.sourceWidth), 0, rendered.sourceWidth - 1);
      const sy = clamp(Math.round(normY * rendered.sourceHeight), 0, rendered.sourceHeight - 1);
      const sw = clamp(Math.round(normW * rendered.sourceWidth), 1, rendered.sourceWidth - sx);
      const sh = clamp(Math.round(normH * rendered.sourceHeight), 1, rendered.sourceHeight - sy);

      return { sx, sy, sw, sh };
    }

    function getSelectedGameType() {
      const selected = document.querySelector('input[name="gameType"]:checked');
      return selected ? selected.value : "CASH";
    }

    async function applyZoom(value) {
      const zoomValue = clamp(Number(value) || 1, 1, 3);
      zoomSlider.value = zoomValue.toFixed(1);
      zoomValueEl.textContent = `${zoomValue.toFixed(1)}x`;

      if (supportsNativeZoom && videoTrack && typeof videoTrack.applyConstraints === "function") {
        try {
          await videoTrack.applyConstraints({
            advanced: [{ zoom: zoomValue }]
          });
          cssZoomFactor = 1;
          video.style.transform = "scale(1)";
          return;
        } catch (error) {
          console.warn("Native zoom failed, using CSS fallback.", error);
          supportsNativeZoom = false;
        }
      }

      cssZoomFactor = zoomValue;
      video.style.transform = `scale(${zoomValue})`;
    }

    function configureZoom(track) {
      supportsNativeZoom = false;
      cssZoomFactor = 1;
      video.style.transform = "scale(1)";

      if (!track || typeof track.getCapabilities !== "function") {
        return;
      }

      const capabilities = track.getCapabilities();
      if (!capabilities || typeof capabilities.zoom !== "object") {
        return;
      }

      const min = Number.isFinite(capabilities.zoom.min) ? capabilities.zoom.min : 1;
      const max = Number.isFinite(capabilities.zoom.max) ? capabilities.zoom.max : 3;
      const step = Number.isFinite(capabilities.zoom.step) && capabilities.zoom.step > 0
        ? capabilities.zoom.step
        : 0.1;
      const clampedMin = clamp(min, 1, 10);
      const clampedMax = clamp(max, clampedMin, 10);

      zoomSlider.min = String(clampedMin);
      zoomSlider.max = String(clampedMax);
      zoomSlider.step = String(step);
      zoomSlider.value = String(clamp(Number(zoomSlider.value) || 1, clampedMin, clampedMax));
      supportsNativeZoom = true;
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraStatusEl.textContent = "CAMERA API NOT SUPPORTED";
        setHud("NETWORK ERROR", "NETWORK ERROR");
        setVisionConsole("Camera API is not supported in this browser.", true);
        return;
      }

      try {
        const videoConstraints = {
          facingMode: { exact: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        };
        const supportedConstraints =
          typeof navigator.mediaDevices.getSupportedConstraints === "function"
            ? navigator.mediaDevices.getSupportedConstraints()
            : {};
        if (supportedConstraints.focusMode) {
          videoConstraints.advanced = [{ focusMode: "continuous" }];
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: false
        });

        const [track] = stream.getVideoTracks();
        videoTrack = track || null;
        if (videoTrack && typeof videoTrack.getCapabilities === "function" && typeof videoTrack.applyConstraints === "function") {
          const capabilities = videoTrack.getCapabilities();
          if (Array.isArray(capabilities.focusMode) && capabilities.focusMode.includes("continuous")) {
            await videoTrack.applyConstraints({
              advanced: [{ focusMode: "continuous" }]
            });
          }
        }

        video.srcObject = stream;
        await video.play();
        configureZoom(videoTrack);
        await applyZoom(Number(zoomSlider.value));
        updateTargetingBoxSize();
        cameraStatusEl.textContent = "REAR CAMERA ACTIVE";
        analyzeBtn.disabled = false;
        downloadBtn.disabled = false;
        setVisionConsole("Camera ready. Tap ANALYZE to process a compressed frame.");
      } catch (error) {
        console.error(error);
        cameraStatusEl.textContent = "CAMERA ACCESS FAILED";
        setHud("NETWORK ERROR", "NETWORK ERROR");
        setVisionConsole("Camera access failed: " + (error.message || "Unknown error"), true);
      }
    }

    function captureFrameAsJpeg() {
      return new Promise((resolve, reject) => {
        const sourceWidth = video.videoWidth;
        const sourceHeight = video.videoHeight;

        if (!sourceWidth || !sourceHeight) {
          reject(new Error("Video frame unavailable."));
          return;
        }

        const smartCrop = getSmartCropRectFromTargetingBox();
        if (!smartCrop) {
          reject(new Error("Targeting crop unavailable."));
          return;
        }

        let targetWidth = smartCrop.sw;
        let targetHeight = smartCrop.sh;

        if (targetWidth > MAX_WIDTH) {
          const scale = MAX_WIDTH / targetWidth;
          targetWidth = MAX_WIDTH;
          targetHeight = Math.max(1, Math.round(targetHeight * scale));
        }

        captureCanvas.width = targetWidth;
        captureCanvas.height = targetHeight;

        const ctx = captureCanvas.getContext("2d");
        if (!ctx) {
          reject(new Error("Canvas context unavailable."));
          return;
        }

        ctx.drawImage(
          video,
          smartCrop.sx,
          smartCrop.sy,
          smartCrop.sw,
          smartCrop.sh,
          0,
          0,
          targetWidth,
          targetHeight
        );

        captureCanvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("JPEG conversion failed."));
            return;
          }
          resolve(blob);
        }, "image/jpeg", JPEG_QUALITY);
      });
    }

    async function analyzeFrame() {
      analyzeBtn.disabled = true;
      setButtonState("CAPTURING...");

      try {
        const gameType = getSelectedGameType();
        const imageBlob = await captureFrameAsJpeg();

        const formData = new FormData();
        formData.append("image", imageBlob, "frame.jpg");
        formData.append("game_type", gameType);

        setButtonState("UPLOADING...");
        const response = await fetch("/analyze", {
          method: "POST",
          body: formData
        });

        setButtonState("ANALYZING...");
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error("Server " + response.status + ": " + errorText);
        }

        const result = await response.json();
        setHud(
          String(result.action || "WAITING...").toUpperCase(),
          String(result.size || "WAITING...").toUpperCase()
        );

        const statePayload = typeof result.state === "object" && result.state !== null
          ? result.state
          : result;
        setVisionConsole(JSON.stringify(statePayload, null, 2));
      } catch (error) {
        console.error(error);
        setHud("NETWORK ERROR", "NETWORK ERROR");
        setVisionConsole("NETWORK ERROR\n" + (error.message || "Request failed"), true);
      } finally {
        analyzeBtn.disabled = false;
        setButtonState("ANALYZE");
      }
    }

    async function downloadSnapshot() {
      downloadBtn.disabled = true;
      const originalText = downloadBtn.textContent;
      downloadBtn.textContent = "CAPTURING...";

      try {
        const imageBlob = await captureFrameAsJpeg();
        const url = URL.createObjectURL(imageBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "frame.jpg";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setVisionConsole("Snapshot downloaded as frame.jpg.");
      } catch (error) {
        console.error(error);
        setVisionConsole("Snapshot failed: " + (error.message || "Unknown error"), true);
      } finally {
        downloadBtn.textContent = originalText;
        downloadBtn.disabled = false;
      }
    }

    analyzeBtn.addEventListener("click", analyzeFrame);
    downloadBtn.addEventListener("click", downloadSnapshot);
    zoomSlider.addEventListener("input", (event) => {
      applyZoom(event.target.value).catch((error) => console.warn("Zoom update failed:", error));
    });
    window.addEventListener("resize", updateTargetingBoxSize);
    video.addEventListener("loadedmetadata", updateTargetingBoxSize);

    window.addEventListener("beforeunload", () => {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    });

    startCamera();
  </script>
</body>
</html>
