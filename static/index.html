<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VSAT Tactical HUD</title>
  <style>
    :root {
      --bg-0: #030508;
      --bg-1: #081018;
      --panel: #0b121a;
      --line: #1a2b3c;
      --line-soft: #163246;
      --text: #e8f3ff;
      --muted: #89a9c2;
      --accent: #00d8ff;
      --accent-2: #5cff9b;
      --danger: #ff5f5f;
      --ok: #6dffbf;
      --scope-mask: rgba(3, 8, 14, 0.72);
      --console: #040b12;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% -10%, #10344d 0%, transparent 35%),
        radial-gradient(circle at 90% 10%, #0d2a3c 0%, transparent 33%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      color: var(--text);
      font-family: "Orbitron", "Segoe UI", Tahoma, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: minmax(320px, 54dvh) auto 1fr;
      background: transparent;
    }

    .camera {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      touch-action: none;
      background: #02060c;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center center;
      will-change: transform;
      background: #000;
      filter: contrast(1.07) saturate(1.02);
    }

    #viewfinder {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 82%);
      max-width: 90vw;
      max-height: 90%;
      aspect-ratio: 16 / 9;
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 9999px var(--scope-mask);
      pointer-events: none;
      z-index: 4;
    }

    #viewfinder::before,
    #viewfinder::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #viewfinder::before {
      width: 32%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.8;
    }

    #viewfinder::after {
      width: 1px;
      height: 32%;
      background: linear-gradient(180deg, transparent, var(--accent), transparent);
      opacity: 0.8;
    }

    #viewfinder .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 0 solid var(--accent);
      filter: drop-shadow(0 0 3px rgba(0, 216, 255, 0.6));
    }

    #viewfinder .tl {
      top: -2px;
      left: -2px;
      border-top-width: 4px;
      border-left-width: 4px;
    }

    #viewfinder .tr {
      top: -2px;
      right: -2px;
      border-top-width: 4px;
      border-right-width: 4px;
    }

    #viewfinder .bl {
      bottom: -2px;
      left: -2px;
      border-bottom-width: 4px;
      border-left-width: 4px;
    }

    #viewfinder .br {
      bottom: -2px;
      right: -2px;
      border-bottom-width: 4px;
      border-right-width: 4px;
    }

    .camera-status {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #22445d;
      background: rgba(2, 10, 18, 0.75);
      color: var(--muted);
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      z-index: 5;
      backdrop-filter: blur(4px);
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(10, 18, 28, 0.97), rgba(8, 14, 22, 0.97));
      border-bottom: 1px solid var(--line);
    }

    .gesture-hint {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(8, 18, 29, 0.85);
    }

    .toggle-wrap {
      display: grid;
      gap: 8px;
    }

    .toggle-label {
      color: var(--muted);
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-option span {
      min-height: 56px;
      display: grid;
      place-items: center;
      border: 1px solid #25445d;
      border-radius: 12px;
      background: linear-gradient(180deg, #132737 0%, #0f1f2d 100%);
      color: #b8d6ec;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      transition: 120ms ease;
      user-select: none;
    }

    .toggle-option input:checked + span {
      color: #001724;
      border-color: #50e4ff;
      background: linear-gradient(180deg, #6af1ff 0%, #2ddcff 100%);
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    #analyzeBtn {
      width: 100%;
      min-height: 98px;
      border: 1px solid #4ef0ff;
      border-radius: 14px;
      background:
        radial-gradient(circle at 30% 20%, #8cf7ff 0%, transparent 50%),
        linear-gradient(180deg, #17d8ff 0%, #05abd0 100%);
      color: #03161f;
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      cursor: pointer;
      touch-action: manipulation;
    }

    #analyzeBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #downloadBtn {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid #2d4e67;
      background: linear-gradient(180deg, #15273a 0%, #111f2f 100%);
      color: #d4ecff;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      touch-action: manipulation;
    }

    #downloadBtn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .results {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
      background: linear-gradient(180deg, rgba(7, 14, 22, 0.95) 0%, rgba(3, 8, 14, 0.98) 100%);
    }

    .telemetry-wrap {
      padding: 10px 12px 0;
    }

    .telemetry-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #uploadProgress {
      width: 100%;
      height: 12px;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid #214257;
      border-radius: 999px;
      overflow: hidden;
      background: #08121d;
    }

    #uploadProgress::-webkit-progress-bar {
      background: #08121d;
    }

    #uploadProgress::-webkit-progress-value {
      background: linear-gradient(90deg, #00b8ff 0%, #00f4ff 45%, #7affc4 100%);
    }

    #uploadProgress::-moz-progress-bar {
      background: linear-gradient(90deg, #00b8ff 0%, #00f4ff 45%, #7affc4 100%);
    }

    .hud {
      display: grid;
      gap: 14px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .hud-block {
      display: grid;
      gap: 6px;
    }

    .hud-label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hud-value {
      color: var(--text);
      font-size: clamp(2rem, 10.5vw, 4.9rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 213, 255, 0.25);
      word-break: break-word;
    }

    .vision-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 12px;
    }

    .vision-title {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      font-weight: 700;
      text-transform: uppercase;
    }

    #visionConsole {
      margin: 0;
      min-height: 140px;
      max-height: 34dvh;
      overflow: auto;
      border: 1px solid #1f3547;
      border-radius: 10px;
      padding: 10px;
      background: var(--console);
      color: #cbeaff;
      font: 0.76rem/1.35 Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok {
      color: var(--ok);
    }

    .error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="camera" class="camera">
      <video id="video" autoplay playsinline muted></video>
      <div id="viewfinder" aria-hidden="true">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
      </div>
      <div id="cameraStatus" class="camera-status">REQUESTING CAMERA...</div>
    </section>

    <section class="controls">
      <div class="gesture-hint">
        <span>1 Finger: Pan</span>
        <span>2 Fingers: Pinch Zoom</span>
      </div>

      <div class="toggle-wrap">
        <div class="toggle-label">Game Type</div>
        <div class="toggle-group" role="radiogroup" aria-label="Game Type">
          <label class="toggle-option">
            <input type="radio" name="gameType" value="CASH" checked>
            <span>CASH</span>
          </label>
          <label class="toggle-option">
            <input type="radio" name="gameType" value="TOURNAMENT">
            <span>TOURNEY</span>
          </label>
        </div>
      </div>

      <div class="action-buttons">
        <button id="analyzeBtn" type="button" disabled>ANALYZE</button>
        <button id="downloadBtn" type="button" disabled>DOWNLOAD SNAPSHOT</button>
      </div>
    </section>

    <section class="results">
      <div class="telemetry-wrap">
        <div class="telemetry-top">
          <span>Upload Telemetry</span>
          <span id="progressText">0%</span>
        </div>
        <progress id="uploadProgress" max="100" value="0"></progress>
      </div>

      <section class="hud" aria-live="polite">
        <div class="hud-block">
          <div class="hud-label">Action</div>
          <div id="action" class="hud-value">WAITING...</div>
        </div>
        <div class="hud-block">
          <div class="hud-label">Size</div>
          <div id="size" class="hud-value">WAITING...</div>
        </div>
      </section>

      <section class="vision-panel">
        <div class="vision-title">Vision Console</div>
        <pre id="visionConsole">WAITING FOR ANALYSIS OUTPUT...</pre>
      </section>
    </section>

    <canvas id="captureCanvas" hidden></canvas>
  </main>

  <script>
    const MAX_WIDTH = 1280;
    const JPEG_QUALITY = 0.74;
    const MIN_ZOOM = 1;
    const MAX_ZOOM = 4;

    const cameraEl = document.getElementById("camera");
    const video = document.getElementById("video");
    const viewfinder = document.getElementById("viewfinder");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const actionEl = document.getElementById("action");
    const sizeEl = document.getElementById("size");
    const cameraStatusEl = document.getElementById("cameraStatus");
    const captureCanvas = document.getElementById("captureCanvas");
    const visionConsole = document.getElementById("visionConsole");
    const uploadProgress = document.getElementById("uploadProgress");
    const progressText = document.getElementById("progressText");

    let stream = null;
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let gestureMode = "none";
    let panStartX = 0;
    let panStartY = 0;
    let pinchStartDistance = 0;
    let pinchStartZoom = 1;
    let pinchStartPanX = 0;
    let pinchStartPanY = 0;
    let pinchStartMidX = 0;
    let pinchStartMidY = 0;

    function setHud(actionText, sizeText) {
      actionEl.textContent = actionText;
      sizeEl.textContent = sizeText;
    }

    function setAnalyzeButtonState(text) {
      analyzeBtn.textContent = text;
    }

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Math.round(percent)));
      uploadProgress.value = value;
      progressText.textContent = `${value}%`;
    }

    function setVisionConsole(value, isError = false) {
      visionConsole.textContent = value;
      visionConsole.classList.toggle("error", isError);
      visionConsole.classList.toggle("ok", !isError);
    }

    function getSelectedGameType() {
      const selected = document.querySelector('input[name="gameType"]:checked');
      return selected ? selected.value : "CASH";
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getTouchDistance(t0, t1) {
      const dx = t1.clientX - t0.clientX;
      const dy = t1.clientY - t0.clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchMidpoint(t0, t1) {
      return {
        x: (t0.clientX + t1.clientX) / 2,
        y: (t0.clientY + t1.clientY) / 2
      };
    }

    function getBaseVideoRectInContainer() {
      const cw = cameraEl.clientWidth;
      const ch = cameraEl.clientHeight;
      const sw = video.videoWidth;
      const sh = video.videoHeight;

      if (!cw || !ch || !sw || !sh) {
        return null;
      }

      const containerAspect = cw / ch;
      const sourceAspect = sw / sh;
      let drawWidth;
      let drawHeight;

      if (containerAspect > sourceAspect) {
        drawWidth = cw;
        drawHeight = drawWidth / sourceAspect;
      } else {
        drawHeight = ch;
        drawWidth = drawHeight * sourceAspect;
      }

      return {
        width: drawWidth,
        height: drawHeight,
        left: (cw - drawWidth) / 2,
        top: (ch - drawHeight) / 2,
        sourceWidth: sw,
        sourceHeight: sh
      };
    }

    function clampPan() {
      const base = getBaseVideoRectInContainer();
      if (!base) {
        panX = 0;
        panY = 0;
        return;
      }

      const scaledWidth = base.width * zoom;
      const scaledHeight = base.height * zoom;
      const maxPanX = Math.max(0, (scaledWidth - cameraEl.clientWidth) / 2);
      const maxPanY = Math.max(0, (scaledHeight - cameraEl.clientHeight) / 2);

      panX = clamp(panX, -maxPanX, maxPanX);
      panY = clamp(panY, -maxPanY, maxPanY);
    }

    function applyVideoTransform() {
      clampPan();
      video.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    function onTouchStart(event) {
      if (event.touches.length === 2) {
        event.preventDefault();
        gestureMode = "pinch";
        pinchStartDistance = getTouchDistance(event.touches[0], event.touches[1]);
        pinchStartZoom = zoom;
        pinchStartPanX = panX;
        pinchStartPanY = panY;
        const midpoint = getTouchMidpoint(event.touches[0], event.touches[1]);
        pinchStartMidX = midpoint.x;
        pinchStartMidY = midpoint.y;
        return;
      }

      if (event.touches.length === 1) {
        event.preventDefault();
        gestureMode = "pan";
        panStartX = event.touches[0].clientX - panX;
        panStartY = event.touches[0].clientY - panY;
      }
    }

    function onTouchMove(event) {
      if (gestureMode === "pinch" && event.touches.length === 2) {
        event.preventDefault();
        const distance = getTouchDistance(event.touches[0], event.touches[1]);
        if (pinchStartDistance > 0) {
          const factor = distance / pinchStartDistance;
          zoom = clamp(pinchStartZoom * factor, MIN_ZOOM, MAX_ZOOM);
        }

        const midpoint = getTouchMidpoint(event.touches[0], event.touches[1]);
        panX = pinchStartPanX + (midpoint.x - pinchStartMidX);
        panY = pinchStartPanY + (midpoint.y - pinchStartMidY);
        applyVideoTransform();
        return;
      }

      if (gestureMode === "pan" && event.touches.length === 1) {
        event.preventDefault();
        panX = event.touches[0].clientX - panStartX;
        panY = event.touches[0].clientY - panStartY;
        applyVideoTransform();
      }
    }

    function onTouchEnd(event) {
      if (event.touches.length === 0) {
        gestureMode = "none";
      } else if (event.touches.length === 1) {
        gestureMode = "pan";
        panStartX = event.touches[0].clientX - panX;
        panStartY = event.touches[0].clientY - panY;
      }
    }

    function mapContainerPointToSource(x, y) {
      const base = getBaseVideoRectInContainer();
      if (!base) {
        return null;
      }

      const cx = cameraEl.clientWidth / 2;
      const cy = cameraEl.clientHeight / 2;

      const xAfterTranslation = x - panX;
      const yAfterTranslation = y - panY;
      const xBase = cx + (xAfterTranslation - cx) / zoom;
      const yBase = cy + (yAfterTranslation - cy) / zoom;

      const u = (xBase - base.left) / base.width;
      const v = (yBase - base.top) / base.height;

      return {
        u,
        v,
        sourceWidth: base.sourceWidth,
        sourceHeight: base.sourceHeight
      };
    }

    function getSmartCropFromViewfinder() {
      const cameraRect = cameraEl.getBoundingClientRect();
      const finderRect = viewfinder.getBoundingClientRect();

      const x0 = finderRect.left - cameraRect.left;
      const y0 = finderRect.top - cameraRect.top;
      const x1 = finderRect.right - cameraRect.left;
      const y1 = finderRect.bottom - cameraRect.top;

      const topLeft = mapContainerPointToSource(x0, y0);
      const bottomRight = mapContainerPointToSource(x1, y1);
      if (!topLeft || !bottomRight) {
        return null;
      }

      const sourceWidth = topLeft.sourceWidth;
      const sourceHeight = topLeft.sourceHeight;

      const sx0 = clamp(Math.round(topLeft.u * sourceWidth), 0, sourceWidth - 1);
      const sy0 = clamp(Math.round(topLeft.v * sourceHeight), 0, sourceHeight - 1);
      const sx1 = clamp(Math.round(bottomRight.u * sourceWidth), sx0 + 1, sourceWidth);
      const sy1 = clamp(Math.round(bottomRight.v * sourceHeight), sy0 + 1, sourceHeight);

      const sw = sx1 - sx0;
      const sh = sy1 - sy0;
      if (sw < 2 || sh < 2) {
        return null;
      }

      return { sx: sx0, sy: sy0, sw, sh };
    }

    function captureFrameAsJpeg() {
      return new Promise((resolve, reject) => {
        if (!video.videoWidth || !video.videoHeight) {
          reject(new Error("Video frame unavailable."));
          return;
        }

        const crop = getSmartCropFromViewfinder();
        if (!crop) {
          reject(new Error("Smart crop unavailable."));
          return;
        }

        let targetWidth = crop.sw;
        let targetHeight = crop.sh;
        if (targetWidth > MAX_WIDTH) {
          const scale = MAX_WIDTH / targetWidth;
          targetWidth = MAX_WIDTH;
          targetHeight = Math.max(1, Math.round(targetHeight * scale));
        }

        captureCanvas.width = targetWidth;
        captureCanvas.height = targetHeight;

        const ctx = captureCanvas.getContext("2d");
        if (!ctx) {
          reject(new Error("Canvas context unavailable."));
          return;
        }

        ctx.drawImage(
          video,
          crop.sx,
          crop.sy,
          crop.sw,
          crop.sh,
          0,
          0,
          targetWidth,
          targetHeight
        );

        captureCanvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("JPEG conversion failed."));
            return;
          }
          resolve(blob);
        }, "image/jpeg", JPEG_QUALITY);
      });
    }

    function analyzeFrame() {
      analyzeBtn.disabled = true;
      setAnalyzeButtonState("CAPTURING...");
      setProgress(0);

      captureFrameAsJpeg()
        .then((imageBlob) => {
          const formData = new FormData();
          formData.append("image", imageBlob, "frame.jpg");
          formData.append("game_type", getSelectedGameType());

          return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/analyze", true);
            xhr.responseType = "json";

            xhr.upload.onprogress = (event) => {
              if (event.lengthComputable) {
                const percent = (event.loaded / event.total) * 100;
                setProgress(percent);
              } else {
                setProgress(30);
              }
            };

            xhr.onloadstart = () => setAnalyzeButtonState("UPLOADING...");
            xhr.onreadystatechange = () => {
              if (xhr.readyState === XMLHttpRequest.HEADERS_RECEIVED) {
                setAnalyzeButtonState("ANALYZING...");
              }
            };
            xhr.onerror = () => reject(new Error("Network request failed."));
            xhr.ontimeout = () => reject(new Error("Request timeout."));

            xhr.onload = () => {
              setProgress(100);
              if (xhr.status < 200 || xhr.status >= 300) {
                const text = typeof xhr.responseText === "string" ? xhr.responseText : "Unknown server error";
                reject(new Error(`Server ${xhr.status}: ${text}`));
                return;
              }

              let payload = xhr.response;
              if (!payload || typeof payload !== "object") {
                try {
                  payload = JSON.parse(xhr.responseText);
                } catch (_err) {
                  reject(new Error("Invalid JSON response."));
                  return;
                }
              }
              resolve(payload);
            };

            xhr.send(formData);
          });
        })
        .then((result) => {
          setHud(
            String(result.action || "WAITING...").toUpperCase(),
            String(result.size || "WAITING...").toUpperCase()
          );

          const statePayload = typeof result.state === "object" && result.state !== null
            ? result.state
            : result;
          setVisionConsole(JSON.stringify(statePayload, null, 2));

          if (typeof navigator.vibrate === "function") {
            navigator.vibrate([100, 50, 100]);
          }
        })
        .catch((error) => {
          console.error(error);
          setHud("NETWORK ERROR", "NETWORK ERROR");
          setVisionConsole(`NETWORK ERROR\n${error.message || "Request failed"}`, true);
        })
        .finally(() => {
          analyzeBtn.disabled = false;
          setAnalyzeButtonState("ANALYZE");
        });
    }

    async function downloadSnapshot() {
      downloadBtn.disabled = true;
      const originalText = downloadBtn.textContent;
      downloadBtn.textContent = "CAPTURING...";

      try {
        const imageBlob = await captureFrameAsJpeg();
        const url = URL.createObjectURL(imageBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "frame.jpg";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setVisionConsole("Snapshot downloaded as frame.jpg.");
      } catch (error) {
        console.error(error);
        setVisionConsole(`Snapshot failed: ${error.message || "Unknown error"}`, true);
      } finally {
        downloadBtn.textContent = originalText;
        downloadBtn.disabled = false;
      }
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraStatusEl.textContent = "CAMERA API NOT SUPPORTED";
        setHud("NETWORK ERROR", "NETWORK ERROR");
        setVisionConsole("Camera API is not supported in this browser.", true);
        return;
      }

      try {
        const constraints = {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();

        zoom = 1;
        panX = 0;
        panY = 0;
        applyVideoTransform();

        cameraStatusEl.textContent = "REAR CAMERA ACTIVE";
        analyzeBtn.disabled = false;
        downloadBtn.disabled = false;
        setVisionConsole("Camera ready. Use pinch and drag to align, then tap ANALYZE.");
      } catch (error) {
        console.error(error);
        cameraStatusEl.textContent = "CAMERA ACCESS FAILED";
        setHud("NETWORK ERROR", "NETWORK ERROR");
        setVisionConsole(`Camera access failed: ${error.message || "Unknown error"}`, true);
      }
    }

    cameraEl.addEventListener("touchstart", onTouchStart, { passive: false });
    cameraEl.addEventListener("touchmove", onTouchMove, { passive: false });
    cameraEl.addEventListener("touchend", onTouchEnd, { passive: false });
    cameraEl.addEventListener("touchcancel", onTouchEnd, { passive: false });

    analyzeBtn.addEventListener("click", analyzeFrame);
    downloadBtn.addEventListener("click", downloadSnapshot);

    window.addEventListener("resize", applyVideoTransform);
    video.addEventListener("loadedmetadata", applyVideoTransform);

    window.addEventListener("beforeunload", () => {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    });

    startCamera();
  </script>
</body>
</html>
